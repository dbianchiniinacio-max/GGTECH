<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | GGTECH</title>
    <style>
        :root { --neon-color: #ff6600; --bg-dark: #000; --card-bg: #111; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .checkout-card { background: var(--card-bg); border: 1px solid #222; border-radius: 18px; padding: 30px; max-width: 480px; width: 100%; box-shadow: 0 0 40px rgba(255,102,0,0.15); }
        h1 { color: var(--neon-color); margin-bottom: 10px; }
        p { color: #ccc; line-height: 1.6; }
        .product-info { background: #111; border: 1px solid #222; border-radius: 12px; padding: 18px; margin: 20px 0; }
        .pay-btn, .back-link { display: inline-block; text-decoration: none; color: #000; background: var(--neon-color); padding: 14px 22px; border-radius: 10px; font-weight: bold; transition: transform .2s; }
        .pay-btn:hover, .back-link:hover { transform: scale(1.02); }
        .back-link { background: transparent; color: #fff; border: 1px solid #444; margin-left: 12px; }
    </style>
</head>
<body>
    <div class="checkout-card">
        <h1>Finalizar Compra</h1>
        <p id="checkout-text">Carregando informações do pedido...</p>
        <div id="product-info" class="product-info" style="display:none;">
            <p><strong>Produto:</strong> <span id="product-name"></span></p>
            <p><strong>Preço:</strong> R$ <span id="product-price"></span></p>
            <p><strong>ID do pedido:</strong> <span id="product-id"></span></p>
        </div>
        <a id="pay-link" class="pay-btn" href="#">Ir para o pagamento</a>
        <a href="index.html" class="back-link">Voltar à loja</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const checkoutText = document.getElementById('checkout-text');
        const payLink = document.getElementById('pay-link');
        const productInfo = document.getElementById('product-info');
        const productName = document.getElementById('product-name');
        const productPrice = document.getElementById('product-price');
        const productId = document.getElementById('product-id');

        // Simular produtos (deve ser sincronizado com produto.html)
        const products = [
            { 
                name: "Fone M25 Gamer", 
                price: 69,
                desc: "O Fone M25 possui baixa latência para jogos competitivos, som surround 7.1 e microfone com cancelamento de ruído. Ideal para longas sessões de gameplay.",
                reviews: [
                    {user: "Lucas", text: "Muito bom para o preço, o som é limpo.", stars: "⭐⭐⭐⭐⭐"},
                    {user: "Ana", text: "Chegou rápido e a bateria dura muito.", stars: "⭐⭐⭐⭐⭐"}
                ],
                paymentLink: "https://deflow.exchange/pay/ef094af0be50cda7"
            },
            { 
                name: "Fone Bluetooth i12", 
                price: 35,
                desc: "Fones compactos com conexão Bluetooth 5.0 estável. Perfeitos para ouvir música no dia a dia com praticidade e leveza.",
                reviews: [
                    {user: "Carla", text: "Simples e funcional. Vale o custo benefício.", stars: "⭐⭐⭐⭐"}
                ],
                paymentLink: "https://deflow.exchange/pay/d3882585f2883052"
            },
            { 
                name: "Teclado RGB Pro", 
                price: 149,
                desc: "Teclado mecânico com switches azuis, iluminação RGB customizável e tecnologia anti-ghosting completa.",
                reviews: [
                    {user: "Gamer99", text: "Clique bem satisfatório e cores lindas!", stars: "⭐⭐⭐⭐⭐"}
                ],
                paymentLink: "https://deflow.exchange/pay/9cbb582f13915724"
            },
            { 
                name: "Teclado Wireless", 
                price: 99,
                desc: "Liberdade sem fios! Teclado ultra fino com bateria recarregável e resposta instantânea sem lag.",
                reviews: [
                    {user: "Roberto", text: "Excelente para produtividade e clean setup.", stars: "⭐⭐⭐⭐⭐"}
                ],
                paymentLink: "https://deflow.exchange/pay/a68d25a13ae56484"
            },
            { 
                name: "Mouse Gamer Black", 
                price: 79,
                desc: "Mouse ergonômico com 7 botões programáveis e ajuste de DPI até 7200. Precisão cirúrgica para seus jogos.",
                reviews: [
                    {user: "Vitor", text: "Peso ideal e pegada muito boa.", stars: "⭐⭐⭐⭐"}
                ],
                paymentLink: "https://deflow.exchange/pay/f72d5ac01b9e55ea"
            },
            { 
                name: "Attack Shark X11", 
                price: 89,
                desc: "Mouse super leve (63g) com sensor PixArt PAW3311 de alta performance. O queridinho dos pro-players.",
                reviews: [
                    {user: "Felipe", text: "Incrível, muito leve mesmo. Mudou meu jogo.", stars: "⭐⭐⭐⭐⭐"}
                ],
                paymentLink: "https://deflow.exchange/pay/91a34b8a07b028ee"
            }
        ];

        // Função para gerar ID aleatório do pedido
        function generateOrderId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        if (id && products[id]) {
            const product = products[id];
            productName.innerText = product.name;
            productPrice.innerText = product.price;
            productId.innerText = generateOrderId();
            checkoutText.innerText = 'Você será redirecionado para o pagamento do produto escolhido.';
            productInfo.style.display = 'block';
            payLink.href = product.paymentLink;
        } else {
            checkoutText.innerText = 'Nenhum produto foi selecionado. Volte para a loja e escolha um produto antes de finalizar a compra.';
            payLink.style.display = 'none';
        }
    </script>
</body>
</html>
